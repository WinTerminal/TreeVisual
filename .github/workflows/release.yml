name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REPO: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Embed web assets
        run: python3 scripts/embed-web.py

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DWEB_EMBEDDED=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          PKG="tree-linux-${{ github.ref_name }}"
          mkdir -p "$PKG/web"
          cp build/tree "$PKG/"
          cp install.sh "$PKG/"
          cp src/web/* "$PKG/web/"
          sed "s/{version}/${{ github.ref_name }}/g" packaging/README.txt > "$PKG/README.txt"
          sed "s/{version}/${{ github.ref_name }}/g" packaging/README-zh.txt > "$PKG/README-zh.txt"
          tar czf "$PKG.tar.gz" "$PKG/"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          PKG="tree-macos-${{ github.ref_name }}"
          mkdir -p "$PKG/web"
          cp build/tree "$PKG/"
          cp install.sh "$PKG/"
          cp src/web/* "$PKG/web/"
          sed "s/{version}/${{ github.ref_name }}/g" packaging/README.txt > "$PKG/README.txt"
          sed "s/{version}/${{ github.ref_name }}/g" packaging/README-zh.txt > "$PKG/README-zh.txt"
          zip -r "$PKG.zip" "$PKG/"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "tree-windows-$env:GITHUB_REF_NAME"
          New-Item -ItemType Directory -Path "$pkg/web"
          Copy-Item "build/Release/tree.exe" "$pkg/"
          Copy-Item "install.bat" "$pkg/"
          Copy-Item "src/web/*" "$pkg/web/"
          (Get-Content "packaging/README.txt") -replace "{version}", "$env:GITHUB_REF_NAME" | Set-Content "$pkg/README.txt"
          (Get-Content "packaging/README-zh.txt") -replace "{version}", "$env:GITHUB_REF_NAME" | Set-Content "$pkg/README-zh.txt"
          Compress-Archive -Path "$pkg" -DestinationPath "$pkg.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: package-${{ runner.os }}
          path: |
            tree-*.tar.gz
            tree-*.zip
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true

      - name: List assets
        run: ls -lh

      - name: Auto-sync version numbers
        run: |
          VER="${{ github.ref_name }}"
          echo "Syncing version $VER"

          # Switch to main branch (checkout is in detached HEAD on the tag)
          git checkout main

          # Update index.html version
          sed -i "s/<span>v[0-9.]\+<\/span>/<span>$VER<\/span>/" src/web/index.html

          # Update README badge
          sed -i "s|version-v[0-9.]\+-|version-$VER-|" README.md

          # Add changelog entry to README if not present
          if ! grep -q "### $VER" README.md; then
            LANG=C.UTF-8
            LAST=$(git tag --sort=-creatordate | head -2 | tail -1 2>/dev/null || echo "")
            if [ -n "$LAST" ]; then
              LOG=$(git log "$LAST..${{ github.ref_name }}" --oneline --no-decorate 2>/dev/null | grep -v "chore(bump)" | head -30)
            else
              LOG="Initial release."
            fi
            awk -v ver="$VER" -v logtext="$LOG" '
              /^### v[0-9]/ && !done {
                print "### " ver
                print ""
                print logtext
                print ""
                done=1
              }
              { print }
            ' README.md > README.tmp && mv README.tmp README.md
          fi

          # Commit the version bump
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/web/index.html README.md
          git commit -m "chore(bump): sync version to $VER" || echo "No changes to commit"
          git push

      - name: Generate release notes
        run: |
          BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}"

          # Changelog
          LAST=$(git tag --sort=-creatordate | head -2 | tail -1 2>/dev/null || echo "")
          if [ -n "$LAST" ]; then
            CHANGES=$(git log "$LAST..${{ github.ref_name }}" --oneline --no-decorate 2>/dev/null | head -40)
          else
            CHANGES="Initial release."
          fi

          cat > release-notes.md << EOF
          ## Changelog

          $(echo "$CHANGES" | sed 's/^[0-9a-f]\{7\} /* /')

          ## Downloads

          | Platform | Script | Portable |
          |----------|--------|----------|
          | Windows | [install.bat]($BASE/install.bat) | [tree-windows-${{ github.ref_name }}.zip]($BASE/tree-windows-${{ github.ref_name }}.zip) |
          | macOS | [install.sh]($BASE/install.sh) | [tree-macos-${{ github.ref_name }}.zip]($BASE/tree-macos-${{ github.ref_name }}.zip) |
          | Linux | [install.sh]($BASE/install.sh) | [tree-linux-${{ github.ref_name }}.tar.gz]($BASE/tree-linux-${{ github.ref_name }}.tar.gz) |

          EOF

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            tree-*.tar.gz
            tree-*.zip
            install.sh
            install.bat
