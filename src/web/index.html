<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TreeVisual WebUI</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<!-- Main UI -->
<div class="header">
  <h1 data-i18n="title">TreeVisual</h1>
  <span>v1.1.4</span>
  <div class="autocomplete-wrapper">
    <input type="text" id="pathInput" data-i18n-placeholder="pathPlaceholder" placeholder="Enter directory path...">
  </div>
  <button onclick="scanDirectory()" data-i18n="scan">Scan</button>
</div>
<div class="toolbar">
  <button onclick="goUp()" data-i18n="up">Up</button>
  <button onclick="goHome()" data-i18n="home">Home</button>
  <button onclick="refresh()" data-i18n="refresh">Refresh</button>
  
  <!-- Language Switch -->
  <span class="lang-switch">
    <select id="langSelect" title="Language">
      <option value="en">EN</option>
      <option value="zh">中文</option>
    </select>
  </span>
  
  <!-- Settings -->
  <div class="settings-btn">
    <button onclick="toggleSettings()">&#9881; <span data-i18n="settings">Settings</span></button>
    <div class="settings-panel" id="settingsPanel">
      <h3 data-i18n="settings">Settings</h3>
      <div class="setting-item">
        <label for="showHidden" data-i18n="showHidden">Show hidden files</label>
        <input type="checkbox" id="showHidden">
      </div>
      <div class="setting-item">
        <label for="enableHW">
          <span data-i18n="hwAccel">Hardware Acceleration</span>
        </label>
        <input type="checkbox" id="enableHW">
      </div>
      <div class="setting-item">
        <label for="themeSelect" data-i18n="theme">Theme</label>
        <select id="themeSelect">
          <option value="mocha">Mocha</option>
          <option value="macchiato">Macchiato</option>
          <option value="frappe">Frappé</option>
          <option value="latte">Latte</option>
          <option value="custom" data-i18n="custom">Custom</option>
        </select>
      </div>
      <div class="setting-item">
        <label for="modeSelect" data-i18n="mode">Mode</label>
        <select id="modeSelect">
          <option value="dark" data-i18n="dark">Dark</option>
          <option value="light" data-i18n="light">Light</option>
        </select>
      </div>
      <div id="customColors" class="custom-colors">
        <div class="setting-item">
          <label for="colorBg">Bg</label>
          <input type="color" id="colorBg" value="#1a1b2e">
        </div>
        <div class="setting-item">
          <label for="colorText">Text</label>
          <input type="color" id="colorText" value="#cdd6f4">
        </div>
        <div class="setting-item">
          <label for="colorDir">Dir</label>
          <input type="color" id="colorDir" value="#89b4fa">
        </div>
        <div class="setting-item">
          <label for="colorRoot">Root</label>
          <input type="color" id="colorRoot" value="#cba6f7">
        </div>
      </div>
      <div class="setting-item hw-only">
        <label for="fontSize" data-i18n="fontSize">Font Size</label>
        <select id="fontSize">
          <option value="12">12</option>
          <option value="14" selected>14</option>
          <option value="16">16</option>
          <option value="18">18</option>
          <option value="20">20</option>
        </select>
      </div>
      <div class="setting-item hw-only">
        <label for="fontFamily" data-i18n="fontFamily">Font</label>
        <select id="fontFamily">
          <option value='&quot;Cascadia Code&quot;,&quot;Fira Code&quot;,&quot;JetBrains Mono&quot;,monospace'>Cascadia Code</option>
          <option value='&quot;Consolas&quot;,&quot;Courier New&quot;,monospace'>Consolas</option>
          <option value='&quot;Source Code Pro&quot;,&quot;Courier New&quot;,monospace'>Source Code Pro</option>
          <option value='&quot;Ubuntu Mono&quot;,&quot;DejaVu Sans Mono&quot;,monospace'>Ubuntu Mono</option>
          <option value='&quot;SF Mono&quot;,&quot;Menlo&quot;,monospace'>SF Mono</option>
          <option value='&quot;Courier New&quot;,monospace'>Courier New</option>
        </select>
      </div>
      <div class="setting-item hw-only">
        <label for="animEnabled" data-i18n="animEnabled">Expand Animation</label>
        <input type="checkbox" id="animEnabled" checked>
      </div>
      <div class="setting-item hw-only">
        <label for="animSpeed" data-i18n="animSpeed">Anim Speed</label>
        <select id="animSpeed">
          <option value="100" data-i18n="fast">Fast</option>
          <option value="200" selected data-i18n="normal">Normal</option>
          <option value="400" data-i18n="slow">Slow</option>
        </select>
      </div>
      <div class="setting-item">
        <span data-i18n="serviceMode" style="flex:1">Service Mode</span>
        <span id="serviceStatusLabel">Off</span>
        <button id="serviceToggleBtn" onclick="toggleService()">Enable</button>
      </div>
    </div>
  </div>
  <span id="status"></span>
</div>
<div class="content" id="treeContainer">
  <!-- Canvas renderer (shown when HW accel is on) -->
  <div id="hwContainer">
    <canvas id="hwCanvas"></canvas>
    <div id="hwTooltip"></div>
  </div>
  <!-- Text tree -->
  <div id="treeText" class="init-msg" data-i18n="loadingInit">Enter a path and click Scan to visualize a directory tree.</div>
</div>

<script src="/i18n.js?v=4"></script>
<script src="/app.js?v=4"></script>
<script src="/webgl.js?v=4"></script>
</body>
</html>
